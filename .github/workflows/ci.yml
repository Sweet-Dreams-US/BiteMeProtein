name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Run on every PR regardless of target branch so stacked PRs (e.g.
    # sub-project branches that target an earlier sub-project branch) get
    # CI validation before merging up the chain.
    branches: ['**']

jobs:
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          # Stub values so tests can import modules that read env at init.
          # Real secrets are never required by the test suite (all I/O is mocked).
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SQUARE_ACCESS_TOKEN: test-square-token
          SQUARE_ENVIRONMENT: sandbox
          SQUARE_LOCATION_ID: TESTLOCATION
          NEXT_PUBLIC_SQUARE_APPLICATION_ID: test-app-id
          NEXT_PUBLIC_SQUARE_LOCATION_ID: TESTLOCATION
          RESEND_API_KEY: test-resend-key
